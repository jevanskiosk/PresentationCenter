<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spring Break Player</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

#player {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 120vw;
  height: 120vh;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* Crawl */
.crawler {
  position: fixed;
  bottom: 5%;
  width: 100%;
  overflow: hidden;
  white-space: nowrap;
  z-index: 10;
}

.crawler__inner {
  display: inline-block;
  animation: crawl 25s linear infinite;
}

.crawler__text {
  font-size: 4rem;
  color: #00796b;
  font-weight: bold;
  padding-right: 10rem;
}

@keyframes crawl {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
</style>
</head>

<body>

<div id="player"></div>

<div class="crawler">
  <div class="crawler__inner">
    <span class="crawler__text">🌸 Spring Break starts April 6th! 🌼☀️</span>
    <span class="crawler__text">🌸 Spring Break starts April 6th! 🌼☀️</span>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const videos = [
  "VIDEO_ID_1",
  "VIDEO_ID_2",
  "VIDEO_ID_3"
  // ← you paste your playlist IDs here
];

let player;
let index = 0;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    videoId: videos[index],
    playerVars: {
      autoplay: 1,
      controls: 0,
      modestbranding: 1,
      rel: 0
    },
    events: {
      onReady: e => e.target.playVideo(),
      onStateChange: onPlayerStateChange,
      onError: nextVideo
    }
  });
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.ENDED) {
    nextVideo();
  }
}

function nextVideo() {
  index = (index + 1) % videos.length;
  player.loadVideoById(videos[index]);
}

/* Recovery if player stalls */
setInterval(() => {
  if (player && player.getPlayerState() !== 1) {
    player.playVideo();
  }
}, 10000);
</script>

</body>
</html>
