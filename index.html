<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spring Break Playlist</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #e0f7fa;
      overflow: hidden;
    }

    .video-container {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 1;
    }

    .video-container iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120vw;
      height: 120vh;
      transform: translate(-50%, -50%);
      border: none;
    }

    .crawler {
      position: fixed;
      bottom: 5%;
      left: 0;
      right: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
      white-space: nowrap;
    }

    .crawler__inner {
      display: inline-block;
      animation: crawl 25s linear infinite;
    }

    .crawler__text {
      display: inline-block;
      padding-right: 10rem;
      font-size: 4rem;
      font-weight: bold;
      color: #00796b;

      -webkit-text-stroke: 2px #004d40;
      text-shadow:
        0 0 10px #80cbc4,
        0 0 20px #4db6ac,
        0 0 30px #26a69a,
        2px 2px 6px rgba(0,0,0,0.6);
    }

    @keyframes crawl {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    @media (max-width: 600px) {
      .crawler__text {
        font-size: 2rem;
        -webkit-text-stroke: 1px #004d40;
      }
    }
  </style>
</head>

<body>
  <div class="video-container">
    <iframe
      id="ytPlayer"
      src="https://www.youtube-nocookie.com/embed/videoseries?list=PLoNXhSmdR5P2FOoj1r4mZ_82o_AoOcVsT&autoplay=1&loop=1&controls=0&modestbranding=1&mute=1&rel=0&iv_load_policy=3&playsinline=1"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <!-- Crawl -->
  <div class="crawler">
    <div class="crawler__inner">
      <span class="crawler__text">🌸 Spring Break starts April 6th! 🌼☀️</span>
      <span class="crawler__text">🌸 Spring Break starts April 6th! 🌼☀️</span>
    </div>
  </div>

  <script>
    const iframe = document.getElementById("ytPlayer");

    function reloadPlayer() {
      const src = iframe.src;
      iframe.src = "";
      setTimeout(() => {
        iframe.src = src + "&t=" + Date.now();
      }, 500);
    }

    // ✅ Backup reload every 60 minutes (rare, not disruptive)
    setInterval(reloadPlayer, 1000 * 60 * 60);

    // ✅ Recovery after Chromebook sleep / wake
    window.addEventListener("focus", reloadPlayer);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) reloadPlayer();
    });

    // ✅ Detect if iframe crashes (gray screen scenario)
    function monitorPlayer() {
      try {
        if (!iframe || iframe.offsetHeight === 0) {
          reloadPlayer();
        }
      } catch (e) {
        reloadPlayer();
      }
    }

    // Check every minute (lightweight)
    setInterval(monitorPlayer, 60000);

    // ✅ Wake Lock (prevents sleep when allowed)
    let wakeLock = null;

    async function enableWakeLock() {
      try {
        wakeLock = await navigator.wakeLock.request('screen');
      } catch (err) {}
    }

    enableWakeLock();

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        enableWakeLock();
      }
    });
  </script>
</body>
</html>
